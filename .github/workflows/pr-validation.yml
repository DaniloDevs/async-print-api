name: Pull Request Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate-pr:
    name: Build & E2E Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: rootpassword
          POSTGRES_DB: async-print
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://root:rootpassword@localhost:5432/async-print?schema=public"
      REDIS_HOST: "localhost"
      REDIS_PORT: 6379
      PORT: 3333

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript (Type check)
        run: pnpm build

      - name: Run Prisma Migrations
        run: pnpm prisma migrate deploy
        
      - name: Run Unit & E2E Tests
        run: pnpm test:e2e
